name: presto
description: App local para gestión de préstamos y cobros

publish_to: 'none' 

version: 2.0.0+11

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  provider: ^6.1.1
  intl: ^0.20.2
  share_plus: ^7.2.1
  uuid: ^4.3.3
  flutter_slidable: ^3.1.0
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.5.4
  file_picker: ^10.3.10
  flutter_native_splash: ^2.4.7
  path_provider: ^2.1.5
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  min_sdk_android: 21

  image_path: "assets/icon/app_icon.png"

  adaptive_icon_background: "#1A1A1A"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  
  web:
    generate: false

flutter_native_splash:
  color: "#1A1A1A"
  color_dark: "#1A1A1A"
  image: assets/splash/splash_logo.png
  image_dark: assets/splash/splash_logo.png
  android_12:
    color: "#1A1A1A"
    color_dark: "#1A1A1A"
    image: assets/splash/splash_logo.png
  fullscreen: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/
    - assets/splash/